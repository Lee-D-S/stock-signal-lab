name: 일별 자동 루틴

on:
  schedule:
    # 평일 08:50 KST = 23:50 UTC (전날 일~목)
    - cron: "50 23 * * 0-4"
    # 평일 16:10 KST = 07:10 UTC (월~금)
    - cron: "10 7 * * 1-5"
  workflow_dispatch:
    inputs:
      job:
        description: "실행할 작업 (morning / daily / both / telegram-test)"
        required: true
        default: "both"
      date:
        description: "기준일 YYYY-MM-DD. 비우면 KIS 최신 거래일"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-auto-${{ github.ref }}
  cancel-in-progress: false

env:
  KIS_MOCK_APP_KEY: ${{ secrets.KIS_MOCK_APP_KEY }}
  KIS_MOCK_APP_SECRET: ${{ secrets.KIS_MOCK_APP_SECRET }}
  KIS_MOCK_ACCOUNT_NO: ${{ secrets.KIS_MOCK_ACCOUNT_NO }}
  KIS_REAL_APP_KEY: ${{ secrets.KIS_REAL_APP_KEY }}
  KIS_REAL_APP_SECRET: ${{ secrets.KIS_REAL_APP_SECRET }}
  KIS_REAL_ACCOUNT_NO: ${{ secrets.KIS_REAL_ACCOUNT_NO }}
  KIS_IS_MOCK: ${{ secrets.KIS_IS_MOCK }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  DART_API_KEY: ${{ secrets.DART_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  DASHBOARD_PORT: "8000"

jobs:
  telegram-alert-test:
    name: 텔레그램 알림 테스트
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'telegram-test'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 텔레그램 테스트 메시지 전송
        run: python -u scripts/send_github_action_telegram_alert.py --status test --job-name "텔레그램 알림 테스트"

  morning-dart-check:
    name: 오전 DART 공시 확인 (08:50 KST)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'morning' || github.event.inputs.job == 'both') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '50 23')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: DART 공시 확인 실행
        run: python -u scripts/auto_morning_dart_check.py

      - name: 성공 텔레그램 알림
        if: success()
        run: python -u scripts/send_github_action_telegram_alert.py --status success --job-name "오전 DART 공시 확인 (08:50 KST)" --soft-fail

      - name: 실패 텔레그램 알림
        if: failure()
        run: python -u scripts/send_github_action_telegram_alert.py --status failure --job-name "오전 DART 공시 확인 (08:50 KST)" --soft-fail

  daily-research-pipeline:
    name: 일일 후보 탐지 + 관찰 추적 (16:10 KST)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'daily' || github.event.inputs.job == 'both') ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '10 7')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 실행 커밋 및 DART 캐시 확인
        run: |
          git rev-parse --short HEAD
          ls -l data/dart_corp_codes.json data/dart_corp_info.json || true

      - name: 일별 후보 탐지 및 관찰 로그 추가
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -u scripts/run_signal_research_pipeline.py --mode daily --date "${{ github.event.inputs.date }}" --refresh-universe --recheck
          else
            python -u scripts/run_signal_research_pipeline.py --mode daily --refresh-universe --recheck
          fi

      - name: 신규 조건 별도 관찰
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -u scripts/run_new_condition_observation.py --date "${{ github.event.inputs.date }}" --delay 0.35
          else
            python -u scripts/run_new_condition_observation.py --delay 0.35
          fi

      - name: 관찰 로그 D+ 추적 업데이트
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -u scripts/run_observation_tracking_update.py --as-of "${{ github.event.inputs.date }}"
          else
            python -u scripts/run_observation_tracking_update.py
          fi

      - name: 관찰 성과 요약 생성
        run: python -u scripts/run_observation_performance_summary.py

      - name: 일일 운영 요약 생성
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -u scripts/run_daily_research_summary.py --date "${{ github.event.inputs.date }}"
          else
            python -u scripts/run_daily_research_summary.py
          fi

      - name: 결과 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "ai 주가 변동 원인 분석/"
          if git diff --cached --quiet; then
            echo "변경 없음"
            exit 0
          fi
          git commit -m "auto: 일일 후보 및 관찰 업데이트 $(date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push

      - name: 성공 텔레그램 알림
        if: success()
        run: python -u scripts/send_github_action_telegram_alert.py --status success --job-name "일일 후보 탐지 + 관찰 추적 (16:10 KST)" --soft-fail

      - name: 실패 텔레그램 알림
        if: failure()
        run: python -u scripts/send_github_action_telegram_alert.py --status failure --job-name "일일 후보 탐지 + 관찰 추적 (16:10 KST)" --soft-fail
